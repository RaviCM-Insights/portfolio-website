<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin login - Portfolio management">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Admin Login - Portfolio</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="dark bg-black text-white min-h-screen flex items-center justify-center">
    <div class="absolute inset-0 -z-10 overflow-hidden">
        <div class="absolute top-20 left-10 w-96 h-96 bg-blue-500/10 rounded-full mix-blend-multiply filter blur-3xl"></div>
        <div class="absolute bottom-20 right-10 w-96 h-96 bg-purple-500/10 rounded-full mix-blend-multiply filter blur-3xl"></div>
    </div>

    <div class="w-full max-w-md">
        <div class="mb-8 text-center">
            <a href="index.html" class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                RC
            </a>
            <h1 class="text-3xl font-bold mt-4 mb-2">Admin Panel</h1>
            <p class="text-gray-400">Secure access to portfolio management</p>
        </div>

        <form id="login-form" class="space-y-6 bg-gray-900/50 backdrop-blur-xl p-8 rounded-xl border border-gray-800">
            <!-- Email -->
            <div>
                <label class="block text-sm font-semibold mb-2">Email Address</label>
                <div class="relative">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input 
                        type="email" 
                        name="email" 
                        required 
                        placeholder="admin@example.com"
                        class="w-full pl-12 pr-4 py-3 rounded-lg bg-gray-800 border border-gray-700 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"
                    >
                </div>
                <div class="email-error hidden text-red-400 text-sm mt-1"></div>
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-semibold mb-2">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input 
                        type="password" 
                        name="password" 
                        required 
                        placeholder="••••••••"
                        class="w-full pl-12 pr-12 py-3 rounded-lg bg-gray-800 border border-gray-700 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"
                        id="password-input"
                    >
                    <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-400">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <div class="password-error hidden text-red-400 text-sm mt-1"></div>
            </div>

            <!-- Remember Me -->
            <label class="flex items-center cursor-pointer">
                <input type="checkbox" name="remember" class="w-4 h-4 rounded bg-gray-800 border-gray-700 focus:ring-2 focus:ring-blue-500">
                <span class="ml-2 text-sm text-gray-400">Remember me for 30 days</span>
            </label>

            <!-- Error Message -->
            <div id="login-error" class="hidden p-4 rounded-lg bg-red-500/10 border border-red-500/50 text-red-400 text-sm"></div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                class="w-full px-6 py-3 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 hover:shadow-lg hover:shadow-blue-500/50 transition-all duration-300 font-semibold flex items-center justify-center gap-2"
            >
                <i class="fas fa-sign-in-alt"></i>
                <span>Sign In</span>
            </button>

            <!-- Forgot Password -->
            <button type="button" class="w-full text-center text-sm text-gray-400 hover:text-blue-400 transition-colors">
                Forgot password?
            </button>
        </form>

        <!-- Demo Credentials -->
        <div class="mt-8 p-4 rounded-lg bg-blue-500/10 border border-blue-500/30 text-sm text-blue-300">
            <p class="font-semibold mb-2">
                <i class="fas fa-info-circle mr-2"></i>Demo Credentials:
            </p>
            <p>Email: <code class="bg-black/50 px-2 py-1 rounded">admin@example.com</code></p>
            <p>Password: <code class="bg-black/50 px-2 py-1 rounded">Password123!</code></p>
        </div>

        <!-- Back Link -->
        <div class="mt-8 text-center">
            <a href="index.html" class="text-gray-400 hover:text-blue-400 transition-colors">
                <i class="fas fa-arrow-left mr-2"></i>Back to Portfolio
            </a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/admin-auth.js"></script>
</body>
</html>
